name: Notify on news update

on:
  push:
    branches: [main]
    paths:
      - '**/index.html'
      - '**/previous.html'

jobs:
  mail:
    runs-on: ubuntu-latest
    steps:
      - name: Send mail
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          to: ${{ secrets.MAIL_TO }}
          from: news-bot <${{ secrets.MAIL_USERNAME }}>
          subject: "[news] ${{ github.event.head_commit.message }}"
          body: |
            ${{ github.event.head_commit.message }}

            最新号: https://${{ github.repository_owner }}.github.io/news/
