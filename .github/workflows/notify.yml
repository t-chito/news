name: Notify on news update

on:
  push:
    branches: [main]
    paths:
      - '**/index.html'
      - '**/previous.html'

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send ntfy notification
        env:
          MSG: ${{ github.event.head_commit.message }}
          OWNER: ${{ github.repository_owner }}
          TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: |
          SUBJECT=$(echo "$MSG" | head -n 1)
          curl -X POST \
            -H "Title: $SUBJECT" \
            -H "Click: https://${OWNER}.github.io/news/" \
            -H "Tags: newspaper" \
            -d "更新がありました" \
            "https://ntfy.sh/${TOPIC}"
