name: Notify on news update

on:
  push:
    branches: [main]
    paths:
      - '**/index.html'
      - '**/previous.html'

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send ntfy notification
        env:
          MSG: ${{ github.event.head_commit.message }}
          OWNER: ${{ github.repository_owner }}
          TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: |
          SUBJECT=$(echo "$MSG" | head -n 1)
          TOPIC_NAME=$(echo "$SUBJECT" | sed -n 's/^\[\([^]]*\)\].*/\1/p')
          if [ -n "$TOPIC_NAME" ] && [ "$TOPIC_NAME" != "test" ]; then
            CLICK_URL="https://${OWNER}.github.io/ecce-fomo/${TOPIC_NAME}/"
          else
            CLICK_URL="https://${OWNER}.github.io/ecce-fomo/"
          fi
          curl -X POST \
            -H "Title: $SUBJECT" \
            -H "Click: $CLICK_URL" \
            -H "Tags: newspaper" \
            -d "更新がありました" \
            "https://ntfy.sh/${TOPIC}"
